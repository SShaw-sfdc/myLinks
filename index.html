<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link in Bio</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #eef1f7;
      --muted: #a8b0c2;
      --border: #262b36;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      --grad-start: #7c5cff;
      --grad-end: #00d4ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(124, 92, 255, 0.15), transparent 45%),
        radial-gradient(circle at 85% 10%, rgba(0, 212, 255, 0.15), transparent 40%),
        var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 1.5rem;
    }

    .card {
      width: min(100%, 420px);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01)), var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem 1.25rem 1.25rem;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .avatar {
      width: 90px;
      height: 90px;
      margin: 0 auto 1rem;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      background:
        linear-gradient(135deg, rgba(124, 92, 255, 0.35), rgba(0, 212, 255, 0.35)),
        rgba(255, 255, 255, 0.05);
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      font-size: 1.55rem;
      line-height: 1.2;
      margin-bottom: 0.45rem;
    }

    .bio {
      color: var(--muted);
      font-size: 0.97rem;
      line-height: 1.5;
      max-width: 32ch;
      margin: 0 auto 1.5rem;
    }

    .links {
      display: grid;
      gap: 0.7rem;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.82rem 1rem;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      letter-spacing: 0.01em;
      background: rgba(255, 255, 255, 0.02);
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .link-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
      background: linear-gradient(120deg, rgba(124, 92, 255, 0.2), rgba(0, 212, 255, 0.16));
    }

    .link-btn:focus-visible {
      outline: 2px solid var(--grad-end);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="avatar" aria-label="Profile picture placeholder">Photo</div>
    <h1>Your Name</h1>
    <p class="bio">Short bio goes here. Share what you do and what people can expect when they connect with you.</p>

    <section class="links" aria-label="Social links">
      <a class="link-btn" href="https://twitter.com/" target="_blank" rel="noopener noreferrer">Twitter</a>
      <a class="link-btn" href="https://www.linkedin.com/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a class="link-btn" href="https://github.com/" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a class="link-btn" href="mailto:you@example.com">Email</a>
    </section>
  </main>
</body>
</html>
